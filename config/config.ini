[pipeline]
incident_db = data/incidents.json
log_file = logs/pipeline.log
log_level = INFO

[aws]
region = us-east-2
sns_topic_arn = arn:aws:sns:us-east-2:522822657254:cloud-telemetry-alerts

[thresholds]
auto_close_hours = 24
max_open_incidents = 50

[routing]
rules_file = config/routing_rules.json
default_channel = sns